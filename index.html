<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#050505">
    <title>LED Screen</title>
    <link rel="manifest" href="./manifest.webmanifest?v=20260601-speed-stepper">
    <link rel="stylesheet" href="./styles.css?v=20260601-speed-stepper">
  </head>
  <body>
    <main class="app">
      <section class="setup" data-setup-view>
        <form class="setup-panel" data-setup-form>
          <div class="brand-block">
            <p class="eyebrow">Mobile billboard</p>
            <h1>LED Screen</h1>
          </div>

          <label class="message-field">
            <span class="field-heading">
              <span>Message</span>
              <span class="counter"><strong data-char-count>0</strong>/120</span>
            </span>
            <textarea
              data-message-input
              rows="4"
              maxlength="120"
              placeholder="오늘의 문구"
              autofocus
            ></textarea>
          </label>

          <fieldset class="color-picker">
            <legend>Color</legend>
            <label class="swatch-option" style="--swatch: #b7ff00; --swatch-rgb: 183, 255, 0">
              <input data-color-input type="radio" name="signColor" value="#b7ff00" checked>
              <span class="swatch"></span>
              <span>Lime</span>
            </label>
            <label class="swatch-option" style="--swatch: #ff2d2d; --swatch-rgb: 255, 45, 45">
              <input data-color-input type="radio" name="signColor" value="#ff2d2d">
              <span class="swatch"></span>
              <span>Red</span>
            </label>
            <label class="swatch-option" style="--swatch: #ffc247; --swatch-rgb: 255, 194, 71">
              <input data-color-input type="radio" name="signColor" value="#ffc247">
              <span class="swatch"></span>
              <span>Amber</span>
            </label>
            <label class="swatch-option" style="--swatch: #26f1ff; --swatch-rgb: 38, 241, 255">
              <input data-color-input type="radio" name="signColor" value="#26f1ff">
              <span class="swatch"></span>
              <span>Cyan</span>
            </label>
            <label class="swatch-option" style="--swatch: #ff4fd8; --swatch-rgb: 255, 79, 216">
              <input data-color-input type="radio" name="signColor" value="#ff4fd8">
              <span class="swatch"></span>
              <span>Pink</span>
            </label>
            <label class="swatch-option" style="--swatch: #f7f7f2; --swatch-rgb: 247, 247, 242">
              <input data-color-input type="radio" name="signColor" value="#f7f7f2">
              <span class="swatch"></span>
              <span>White</span>
            </label>
          </fieldset>

          <fieldset class="speed-picker">
            <legend>Speed</legend>
            <div class="speed-stepper">
              <input data-speed-input type="hidden" name="marqueeSpeed" value="2">
              <button class="step-button" data-speed-down type="button" aria-label="Decrease speed">‹</button>
              <output class="speed-value" data-speed-value for="marqueeSpeed">2x</output>
              <button class="step-button" data-speed-up type="button" aria-label="Increase speed">›</button>
            </div>
          </fieldset>

          <div class="setup-actions">
            <button class="start-button" data-start-button type="submit">Start</button>
          </div>
        </form>
      </section>

      <section class="screen" data-screen-view hidden>
        <div class="screen-toolbar" aria-label="Display controls">
          <button class="icon-button" data-edit-button type="button" aria-label="Edit message">x</button>
          <button class="icon-button" data-fullscreen-button type="button" aria-label="Fullscreen">⛶</button>
        </div>
        <div class="sign-shell">
          <div class="sign-area" data-sign-area>
            <div class="sign-text" data-sign-text></div>
          </div>
        </div>
      </section>
    </main>

    <script type="module" src="./src/app.mjs?v=20260601-speed-stepper"></script>
  </body>
</html>
